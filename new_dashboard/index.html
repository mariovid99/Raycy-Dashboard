<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raycy · Dashboard Ejecutivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/charts.css">
  <link rel="stylesheet" href="assets/css/views.css">
</head>
<body>
  <div id="app">
    <div id="loading-screen" class="loading-screen">
      <div class="loading-inner">
        <div class="loading-brand">RAYCY</div>
        <div class="loading-spinner"></div>
        <p class="loading-text">Cargando dashboard...</p>
      </div>
    </div>
  </div>

  <div id="small-screen-msg" class="small-screen-msg" aria-hidden="true">
    <div class="small-screen-inner">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect width="18" height="14" x="3" y="3" rx="2"/>
        <path d="M7 21h10"/>
        <path d="M12 17v4"/>
      </svg>
      <p>Para la mejor experiencia, abre este dashboard en una pantalla de escritorio (1024px o más).</p>
    </div>
  </div>

  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
